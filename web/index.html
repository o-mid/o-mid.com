<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Omid Mirzaei — Senior Full-Stack Engineer. Flutter, crypto wallets, Web3 and fintech. Dubai · Open to remote.">
  <meta name="theme-color" content="#0C0F16">
  <meta property="og:title" content="Omid Mirzaei — Senior Full-Stack Engineer">
  <meta property="og:description" content="Mobile-first engineer. Flutter, crypto, Web3, fintech.">
  <meta property="og:url" content="https://o-mid.com">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Omid Mirzaei">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png">
  <title>Omid Mirzaei</title>
  <link rel="manifest" href="manifest.json">
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
  <style id="splash-screen-style">
    html { height: 100% }
    body {
      margin: 0;
      min-height: 100%;
      background-color: #0c0f16;
      background-size: 100% 100%;
    }
    .center {
      margin: 0;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
    @media (prefers-color-scheme: dark) {
      body { background-color: #0c0f16; }
    }
  </style>
  <script id="splash-screen-script">
    function removeSplashFromWeb() {
      document.getElementById("splash")?.remove();
      document.getElementById("splash-branding")?.remove();
      document.body.style.background = "transparent";
    }
    // Flutter app mounts under flutter-view; dismiss splash once it appears.
    const dismissWhenReady = () => {
      if (document.querySelector("flutter-view, flt-glass-pane")) {
        removeSplashFromWeb();
        return true;
      }
      return false;
    };
    window.addEventListener("flutter-first-frame", removeSplashFromWeb);
    const observer = new MutationObserver(() => {
      if (dismissWhenReady()) observer.disconnect();
    });
    observer.observe(document.documentElement, { childList: true, subtree: true });
    setTimeout(removeSplashFromWeb, 4000);
  </script>
</head>
<body>
  <picture id="splash">
    <source srcset="splash/img/dark-1x.png 1x, splash/img/dark-2x.png 2x, splash/img/dark-3x.png 3x, splash/img/dark-4x.png 4x" media="(prefers-color-scheme: dark)">
    <source srcset="splash/img/light-1x.png 1x, splash/img/light-2x.png 2x, splash/img/light-3x.png 3x, splash/img/light-4x.png 4x" media="(prefers-color-scheme: light)">
    <img class="center" aria-hidden="true" src="splash/img/dark-1x.png" alt="">
  </picture>
  <script src="flutter_bootstrap.js" async=""></script>
</body>
</html>
